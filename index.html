<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breaking Bad</title>
</head>
<body>
    <style>
        @font-face {
            font-family: 'Lobster';
            src: url('fonts/Lobster-Regular.woff2') format('woff2'),
                url('fonts/Lobster-Regular.woff') format('woff'),
                url('fonts/Lobster-Regular.ttf') format('truetype'),
                url('fonts/Lobster-Regular.svg#Lobster-Regular') format('svg');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <svg version="1.1"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="https://www.w3.org/1999/xlink"
        xml:space="preserve"
        width="300" height="200"
        viewBox="0 0 300 200" >
        <rect width="300" height="200"
            fill="none"
            stroke="#cccccc" stroke-width="2"
            stroke-opacity="0.5"
            stroke-dasharray="6"
            stroke-dashoffset="4" />
        <rect x="4" y="4" 
            width="292" height="192"
            fill="url(#lines)" />
        <defs>
            <pattern id="circles" x="0" y="0"
                width="11" height="10"
                patternUnits="userSpaceOnUse" >
                <rect x="0" y="0" width="11" height="10" fill="#ff401a" />
                <circle cx="3" cy="2" r="1.8" fill="#ffffff" />
            </pattern>
        </defs>
        <defs>
            <pattern id="lines" x="0" y="0"
                width="30" height="192"
                patternUnits="userSpaceOnUse" >
                <rect x="0" y="0" width="15" height="192" fill="#7dc4e8" />
                <rect x="15" y="0" width="15" height="192" fill="#b1dcf1" />
            </pattern>
        </defs>
        <text x="76" y="165"
            fill="#000000"
            font-size="90"
            font-family="Lobster"
            opacity=".3" >
            Bad
        </text>
        <text x="71" y="160"
            fill="url(#circles)"
            font-size="87"
            font-family="Lobster"
            stroke="white"
            stroke-width="1.5" >
            Bad
        </text>
        <text x="43" y="75"
            fill="#000000"
            font-size="45"
            font-family="Lobster"
            opacity=".3" >
            the Breaking
        </text>
        <text x="38" y="70"
            fill="#f4b400"
            font-size="45"
            font-family="Lobster"
            stroke="white"
            stroke-width="1" >
            the Breaking
        </text>
    </svg>
    <style>
        
        @font-face {
            font-family: 'Lobster';
            src: url('../fonts/Lobster-Regular.woff2') format('woff2'),
                url('../fonts/Lobster-Regular.woff') format('woff'),
                url('../fonts/Lobster-Regular.ttf') format('truetype'),
                url('../fonts/Lobster-Regular.svg#Lobster-Regular') format('svg');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
</body>
</html>
